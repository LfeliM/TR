<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Assistente Pessoal na Nuvem</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        /* MANTIVE SEU CSS ORIGINAL EXATAMENTE IGUAL */
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a18;min-height:100vh;padding:1.5rem 1rem}
        .wrap{max-width:560px;margin:0 auto}
        input,textarea,button,select{font-family:inherit;font-size:14px;outline:none}
        input[type=text],input[type=datetime-local],textarea{width:100%;padding:8px 10px;border:0.5px solid #ccc;border-radius:8px;background:#fff;color:#1a1a18}
        button{cursor:pointer;border-radius:8px;border:0.5px solid #ccc;background:transparent;color:#444;padding:6px 14px;transition:background 0.15s}
        .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem}
        .tab{padding:6px 14px;font-size:13px;border-radius:8px}
        .input-box{background:#efefec;border:0.5px solid #ddd;border-radius:12px;padding:12px;margin-bottom:1.25rem}
        .items{display:flex;flex-direction:column;gap:8px}
        .card{background:#fff;border:0.5px solid #ddd;border-radius:12px}
        .card-row{display:flex;align-items:flex-start;gap:10px;padding:10px 12px}
        .dot{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:9px;border:1.5px solid #ccc;background:#f1efe8}
        .dot.done{background:#eaf3de;border-color:#97c459;color:#3b6d11}
        .card-body{flex:1;min-width:0}
        .card-text{font-size:14px;color:#1a1a18}
        .card-text.done-text{text-decoration:line-through;opacity:0.5}
    </style>
</head>
<body>
<div id="app">Conectando à nuvem...</div>

<script>
// 2. CONFIGURAÇÃO DO SEU FIREBASE (COLE SUAS CHAVES AQUI)
const firebaseConfig = {
    apiKey: "SUA_API_KEY",
    authDomain: "seu-projeto.firebaseapp.com",
    projectId: "seu-projeto",
    storageBucket: "seu-projeto.appspot.com",
    messagingSenderId: "ID",
    appId: "ID"
};

// Inicializa o Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const TABS = ["Tarefas","Notas","Lembretes","Ideias"];
const PRIO = {alta:{bg:"#fcebeb",text:"#a32d2d",border:"#f09595",label:"Alta"},media:{bg:"#faeeda",text:"#854f0b",border:"#ef9f27",label:"Média"},baixa:{bg:"#eaf3de",text:"#3b6d11",border:"#97c459",label:"Baixa"}};
const TAB_COLORS = {Tarefas:{bg:"#e6f1fb",text:"#185fa5"},Notas:{bg:"#f1efe8",text:"#5f5e5a"},Lembretes:{bg:"#faeeda",text:"#854f0b"},Ideias:{bg:"#eeedfe",text:"#534ab7"}};

let state = {
    tab: "Tarefas",
    data: {Tarefas:[],Notas:[],Lembretes:[],Ideias:[]},
    selectedPrio: "media"
};

// 3. NOVA FUNÇÃO LOAD (LÊ DA NUVEM EM TEMPO REAL)
function syncCloud() {
    db.collection("agenda").doc("global").onSnapshot((doc) => {
        if (doc.exists) {
            state.data = doc.data();
            render();
        } else {
            // Se o banco estiver vazio, cria a estrutura inicial
            save();
        }
    });
}

// 4. NOVA FUNÇÃO SAVE (SALVA NA NUVEM)
function save() {
    db.collection("agenda").doc("global").set(state.data)
      .catch(e => alert("Erro ao salvar na nuvem: " + e));
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function render() {
    const {tab, data} = state;
    const items = data[tab] || [];
    
    let html = `<div class="wrap">`;
    
    // TABS
    html += `<div class="tabs">`;
    TABS.forEach(t => {
        const active = tab===t;
        const tc = TAB_COLORS[t];
        html += `<button class="tab" onclick="setTab('${t}')" style="background:${active?tc.bg:"transparent"};color:${active?tc.text:"#666"}">${t}</button>`;
    });
    html += `</div>`;

    // INPUT BOX
    html += `<div class="input-box">
        <input type="text" id="newText" placeholder="O que precisa ser feito?"/>
        <div style="display:flex;gap:8px;margin-top:8px">
            <select id="prioSelect" style="flex:1;padding:5px;border-radius:8px;border:0.5px solid #ccc">
                <option value="alta">Prioridade Alta</option>
                <option value="media" selected>Prioridade Média</option>
                <option value="baixa">Prioridade Baixa</option>
            </select>
            <button onclick="addItem()" style="background:#444; color:#fff">Adicionar</button>
        </div>
    </div>`;

    // LISTA DE ITENS
    html += `<div class="items">`;
    items.forEach(item => {
        html += `<div class="card">
            <div class="card-row">
                <div class="dot ${item.status}" onclick="cycleStatus('${item.id}')">${item.status==="done"?"✓":""}</div>
                <div class="card-body">
                    <div class="card-text ${item.status==="done"?"done-text":""}">${item.text}</div>
                    <div style="font-size:10px; color:#888">${item.prio}</div>
                </div>
                <button onclick="removeItem('${item.id}')">×</button>
            </div>
        </div>`;
    });
    html += `</div></div>`;

    document.getElementById("app").innerHTML = html;
}

function setTab(t) { state.tab=t; render(); }

function addItem() {
    const txt = document.getElementById("newText").value.trim();
    if (!txt) return;
    const prio = document.getElementById("prioSelect").value;
    const item = {id:genId(), text:txt, status:"todo", prio:prio, date:new Date().toLocaleDateString()};
    
    state.data[state.tab].unshift(item);
    save(); // Salva na nuvem
}

function removeItem(id) {
    state.data[state.tab] = state.data[state.tab].filter(i=>i.id!==id);
    save(); // Salva na nuvem
}

function cycleStatus(id) {
    state.data[state.tab] = state.data[state.tab].map(i => {
        if(i.id === id) i.status = i.status === "done" ? "todo" : "done";
        return i;
    });
    save(); // Salva na nuvem
}

// INICIALIZAÇÃO
syncCloud(); 
</script>
</body>
</html>
